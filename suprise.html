<!DOCTYPE html>
<html>
<head>
<title>Love Message ♥</title>

<style>
body {
    background: black;
    color: pink;
    font-family: "Courier New";
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
    text-align: center;
}

#message {
    font-size: 25px;
    z-index: 2;
}

/* hati jatuh */
.heart {
    position: absolute;
    top: -20px;
    color: red;
    font-size: 25px;
    animation: fall 5s linear infinite;
}

@keyframes fall {
    0% {
        transform: translateY(-20px);
        opacity: 1;
    }
    100% {
        transform: translateY(100vh);
        opacity: 0;
    }
}
</style>

</head>

<body>

<div id="message"></div>

<script>

// mesej
let text = 
"hai wak ♥\n\n" +
"I miss you 🥺\n\n" +
"Datang la Penang tau\n\n" +
"saya menunggu kamu hehe\n\n"+
"iloveeyouuu♥\n\n";

let i = 0;

function typing(){
    if(i < text.length){
        document.getElementById("message").innerHTML += text.charAt(i).replace("\n","<br>");
        i++;
        setTimeout(typing,120);
    }
}

typing();


// buat hati jatuh
function createHeart(){
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "♥";

    heart.style.left = Math.random() * 100 + "vw";
    heart.style.animationDuration = (Math.random()*3 + 3) + "s";
    heart.style.fontSize = (Math.random()*20 + 15) + "px";

    document.body.appendChild(heart);

    setTimeout(()=>{
        heart.remove();
    },5000);
}

setInterval(createHeart,300);

</script>

</body>
</html>
